<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0050正2 AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>0050正2 AI操盤</h1>
    </div>

    <div class="card">
        <div class="title">價格</div>
        <div class="value" id="price">-</div>
    </div>

    <div class="card">
        <div class="title">漲跌%</div>
        <div class="value" id="change">-</div>
    </div>

    <div class="card">
        <div class="title">AI訊號</div>
        <div class="value" id="signal">-</div>
    </div>

    <div class="card">
        <div class="title">AI分數</div>
        <div class="value" id="score">-</div>
    </div>

    <div class="card">
        <div class="title">盤中</div>
        <div class="value" id="intraday">-</div>
    </div>

    <div class="card">
        <div class="title">明日</div>
        <div class="value" id="tomorrow">-</div>
    </div>

</div>

<script src="api.js"></script>
<script src="ai.js"></script>
<script src="app.js"></script>

</body>
</html>
